name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes
        shell: bash
        run: |
          awk '/^## \[${{ steps.version.outputs.VERSION }}\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md > release_notes.md

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release --build-name=${{ steps.version.outputs.VERSION }}

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\projector_grid.iss /DAppVersion=${{ steps.version.outputs.VERSION }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: installer/output/ProjectorGrid_Setup.exe

  build-macos:
    name: macOS (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes
        run: |
          awk '/^## \[${{ steps.version.outputs.VERSION }}\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md > release_notes.md

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release --build-name=${{ steps.version.outputs.VERSION }}

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r "build/macos/Build/Products/Release/Projector Grid.app" "dmg_staging/Projector Grid.app"
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Projector Grid" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "ProjectorGrid-macOS.dmg"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: ProjectorGrid-macOS.dmg
