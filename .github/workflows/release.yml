name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release --build-name=${{ steps.version.outputs.VERSION }}

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\projector_grid.iss /DAppVersion=${{ steps.version.outputs.VERSION }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/ProjectorGrid_Setup.exe

  build-macos-intel:
    name: macOS Intel
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release --build-name=${{ steps.version.outputs.VERSION }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Projector Grid" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Projector Grid.app" 175 190 \
            --hide-extension "Projector Grid.app" \
            --app-drop-link 425 190 \
            "ProjectorGrid-macOS-Intel.dmg" \
            "build/macos/Build/Products/Release/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ProjectorGrid-macOS-Intel.dmg

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release --build-name=${{ steps.version.outputs.VERSION }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Projector Grid" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Projector Grid.app" 175 190 \
            --hide-extension "Projector Grid.app" \
            --app-drop-link 425 190 \
            "ProjectorGrid-macOS-AppleSilicon.dmg" \
            "build/macos/Build/Products/Release/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ProjectorGrid-macOS-AppleSilicon.dmg
