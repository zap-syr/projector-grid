  <!-- Grid 3x3 — 8 outer cells (muted, greyed out relative to center) -->
  <rect x="16" y="16" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="61" y="16" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="106" y="16" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="16" y="61" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="106" y="61" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="16" y="106" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="61" y="106" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>
  <rect x="106" y="106" width="38" height="38" rx="8" fill="#1e3060" stroke="#3a5a8a" stroke-width="2"/>

